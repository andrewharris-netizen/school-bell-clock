<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>School Bell Clock</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Luxon for timezone-correct math (America/Chicago) -->
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <div class="left">
        <div id="time">--:--:--</div>
        <div id="date">---</div>
      </div>
      <div class="right">
        <div id="modeTag">Mode: --</div>
        <div id="simTag" class="muted"></div>
        <button id="reloadBtn" title="Fetch schedules.json again">Reload schedules</button>
        <button id="fullscreenBtn" title="Fullscreen (Esc to exit)">Fullscreen</button>
      </div>
    </header>

    <main>
      <section id="centerInfo">
        <div id="currentPeriod" class="line"></div>
        <div id="nextBell" class="line"></div>
      </section>

      <aside id="schedulePanel">
        <div class="panelTitle">Today's Schedule</div>
        <div id="scheduleTable"></div>
      </aside>

      <div id="countdownOverlay" class="overlay hidden">
        <div id="countdownText">0:00</div>
      </div>

      <div id="flashOverlay" class="overlay hidden"></div>
      <div id="dimOverlay" class="overlay hidden"></div>
    </main>

    <footer>
      <div class="muted">
        Keys: R/P/E/T/S modes · 1/5/0 timers · Backspace cancel · M mute · +/- volume · [ / ] / \ / N simulate · F fullscreen
      </div>
    </footer>
  </div>

  <div id="toastContainer"></div>

  <!-- Touch once to enable audio in browsers -->
  <button id="audioGate" class="audioGate">Click here once to enable sound</button>

  <script src="app.js"></script>
</body>
</html>
